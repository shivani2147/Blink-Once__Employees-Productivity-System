{% extends "base.html" %}

{% block title %}Register | Blink Once EPS{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card glass-panel" style="max-width: 600px;">
        <div class="text-center mb-4">
            <h1 class="gradient-text">Create Account</h1>
            <p class="text-secondary">Join Blink Once Employees Productivity System</p>
        </div>
        
        {% if error %}
        <div class="alert">
            <i class="fa-solid fa-circle-exclamation"></i> {{ error }}
        </div>
        {% endif %}
        
        <form method="POST" action="/register">
            <div class="grid-2">
                <div class="form-group">
                    <label for="employee_name">Full Name</label>
                    <input type="text" id="employee_name" name="employee_name" class="form-control" required placeholder="John Doe">
                </div>
                
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" class="form-control" required placeholder="john@example.com">
                </div>
            </div>

            <div class="grid-2">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" class="form-control" required placeholder="johndoe">
                </div>
                
                <div class="form-group">
                    <label for="designation">Designation</label>
                    <input type="text" id="designation" name="designation" class="form-control" required placeholder="Video Editor">
                </div>
            </div>
            
            <div class="grid-2">
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-control" required>
                </div>
                
                <div class="form-group">
                    <label for="rewrite_password">Confirm Password</label>
                    <input type="password" id="rewrite_password" name="rewrite_password" class="form-control" required>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 1rem;">
                <i class="fa-solid fa-user-plus"></i> Register Account
            </button>
        </form>
        
        <div class="text-center mt-4">
            <p class="text-secondary">Already have an account? <a href="/login">Login here</a></p>
        </div>
    </div>
</div>
{% endblock %}
