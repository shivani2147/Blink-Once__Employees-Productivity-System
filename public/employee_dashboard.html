<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Dashboard | Blink Once EPS</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="/static/js/theme.js" defer></script>
</head>
<body>
    <nav class="navbar glass-panel">
        <div class="nav-brand">
            <span class="gradient-text"><i class="fa-solid fa-bolt"></i> Blink Once</span>
        </div>
        <div class="nav-links">
            <span class="user-greeting">Hello, <strong id="nav-user-name">Employee</strong></span>
            <a href="/employee/profile" class="btn btn-outline btn-sm"><i class="fa-solid fa-user"></i> My Profile</a>
            <a href="/employee/dashboard" class="btn btn-outline btn-sm"><i class="fa-solid fa-house"></i> Dashboard</a>
            <a href="#" onclick="logout()" class="btn btn-primary btn-sm"><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</a>
        </div>
    </nav>

    <main class="main-container fade-in">
        <div class="flex-between mb-4">
            <h2><i class="fa-solid fa-briefcase"></i> My Productivity Records</h2>
            <button class="btn btn-primary" onclick="openModal('addModal')">
                <i class="fa-solid fa-plus"></i> Add Record
            </button>
        </div>

        <div class="glass-panel" style="padding: 1.5rem;">
            <div id="no-records" class="text-center" style="display: none; padding: 3rem 0;">
                <i class="fa-solid fa-folder-open text-secondary" style="font-size: 3rem; margin-bottom: 1rem;"></i>
                <h3>No records found</h3>
                <p class="text-secondary">Click 'Add Record' to create your first productivity entry.</p>
            </div>
            
            <div id="records-container" class="table-container" style="display: none;">
                <table class="table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Client</th>
                            <th>Project</th>
                            <th>Status</th>
                            <th>Deadline</th>
                            <th>Cameras</th>
                            <th>Est. Workload</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="records-table-body">
                        <!-- Filled by JS -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Add Record Modal -->
        <div id="addModal" class="modal">
            <div class="modal-content glass-panel">
                <button class="modal-close" onclick="closeModal('addModal')">&times;</button>
                <h3 class="mb-3 gradient-text">Add Productivity Record</h3>
                
                <form id="add-form">
                    <div class="grid-2">
                        <div class="form-group">
                            <label>Client Name</label>
                            <input type="text" name="client_name" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label>Date</label>
                            <input type="date" name="date" class="form-control" required>
                        </div>
                    </div>
                    
                    <div class="grid-2">
                        <div class="form-group">
                            <label>Project Name</label>
                            <input type="text" name="project_name" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label>Shoot Type</label>
                            <select name="shoot_type" class="form-control" required>
                                <option value="Wedding">Wedding</option>
                                <option value="Pre-Wedding">Pre-Wedding</option>
                                <option value="Engagement">Engagement</option>
                                <option value="Corporate">Corporate</option>
                                <option value="Birthday">Birthday</option>
                                <option value="Events">Events</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Editing Type</label>
                        <input type="text" name="editing_type" class="form-control" placeholder="eg. Traditional, Reels, Function" required>
                    </div>

                    <div class="grid-2">
                        <div class="form-group">
                            <label>Start Date</label>
                            <input type="date" name="start_date" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label>End Date</label>
                            <input type="date" name="end_date" class="form-control" required>
                        </div>
                    </div>

                    <div class="grid-2">
                        <div class="form-group">
                            <label>Deadline Date</label>
                            <input type="date" name="deadline_date" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label>Video Duration (hrs)</label>
                            <input type="number" step="0.1" name="video_duration" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label>Cameras Used</label>
                            <input type="number" name="cameras_used" class="form-control" min="1" value="1" required>
                        </div>
                    </div>

                    <div class="grid-2">
                        <div class="form-group">
                            <label>Status</label>
                            <select name="status" class="form-control" required>
                                <option value="Not Started">Not Started</option>
                                <option value="Ongoing">Ongoing</option>
                                <option value="Hold">Hold</option>
                                <option value="Done">Done</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Uploaded to Drive?</label>
                            <select name="uploaded_to_drive" class="form-control">
                                <option value="No">No</option>
                                <option value="Yes">Yes</option>
                            </select>
                        </div>
                    </div>

                    <div class="grid-2">
                        <div class="form-group">
                            <label>Harddisk Number</label>
                            <input type="text" name="harddisk_number" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label>Harddisk Directory</label>
                            <input type="text" name="harddisk_directory" class="form-control" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Drive Link</label>
                        <input type="url" name="drive_link" class="form-control">
                    </div>

                    <div class="form-group">
                        <label>Comments</label>
                        <textarea name="comments" class="form-control" rows="3"></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">
                        Save Record
                    </button>
                </form>
            </div>
        </div>

        <!-- Edit Record Modal -->
        <div id="editModal" class="modal">
            <div class="modal-content glass-panel" style="max-width: 400px;">
                <button class="modal-close" onclick="closeModal('editModal')">&times;</button>
                <h3 class="mb-3 gradient-text">Update Record</h3>
                
                <form id="edit-form">
                    <input type="hidden" id="edit_record_id" name="record_id">
                    <div class="form-group">
                        <label>Status</label>
                        <select name="status" id="edit_status" class="form-control" required>
                            <option value="Not Started">Not Started</option>
                            <option value="Ongoing">Ongoing</option>
                            <option value="Hold">Hold</option>
                            <option value="Done">Done</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Drive Link</label>
                        <input type="url" name="drive_link" id="edit_drive_link" class="form-control">
                    </div>

                    <div class="form-group">
                        <label>Comments</label>
                        <textarea name="comments" id="edit_comments" class="form-control" rows="3"></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">
                        Update Record
                    </button>
                </form>
            </div>
        </div>
    </main>

    <script src="/static/js/main.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            // Check auth
            try {
                const meRes = await fetch('/api/auth/me');
                if (!meRes.ok) { window.location.href = '/login'; return; }
                const user = await meRes.json();
                document.getElementById('nav-user-name').textContent = user.employee_name;
            } catch (e) {
                window.location.href = '/login'; return;
            }

            fetchData();
        });

        async function fetchData() {
            const res = await fetch('/api/employee/data');
            const data = await res.json();
            if (!data) {
                return;
            }

            if (!data.records || data.records.length === 0) {
                document.getElementById('no-records').style.display = 'block';
                document.getElementById('records-container').style.display = 'none';
                return;
            }

            document.getElementById('no-records').style.display = 'none';
            document.getElementById('records-container').style.display = 'block';
            
            const tbody = document.getElementById('records-table-body');
            tbody.innerHTML = '';
            
            data.records.forEach(r => {
                const statusClass = r.status.toLowerCase().replace(' ', '');
                tbody.innerHTML += `
                    <tr>
                        <td>${r.date}</td>
                        <td>${r.client_name}</td>
                        <td>${r.project_name}</td>
                        <td><span class="badge badge-${statusClass}">${r.status}</span></td>
                        <td>${r.deadline_date || '-'}</td>
                        <td>${r.cameras_used}</td>
                        <td>${Math.round(parseFloat(r.expected_workload_hours))} hrs</td>
                        <td>
                            <button class="btn btn-outline btn-sm" onclick="openEditModal(${r.id}, '${r.status}', '${r.drive_link}', '${r.comments}')">
                                <i class="fa-solid fa-pen"></i> Edit
                            </button>
                        </td>
                    </tr>
                `;
            });
        }

        // Add
        document.getElementById('add-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());
            data.video_duration = parseFloat(data.video_duration);
            data.cameras_used = parseInt(data.cameras_used);

            await fetch('/api/employee/add', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            closeModal('addModal');
            e.target.reset();
            fetchData();
        });

        // Edit
        document.getElementById('edit-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('edit_record_id').value;
            const data = {
                status: document.getElementById('edit_status').value,
                drive_link: document.getElementById('edit_drive_link').value,
                comments: document.getElementById('edit_comments').value
            };

            await fetch(`/api/employee/edit/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            closeModal('editModal');
            fetchData();
        });

        // Open edit modal custom
        function openEditModal(id, currentStatus, driveLink, comments) {
            document.getElementById('edit_record_id').value = id;
            document.getElementById('edit_status').value = currentStatus;
            document.getElementById('edit_drive_link').value = driveLink;
            document.getElementById('edit_comments').value = comments;
            openModal('editModal');
        }

        async function logout() {
            await fetch('/api/logout', { method: 'POST' });
            window.location.href = '/login';
        }
    </script>
</body>
</html>
