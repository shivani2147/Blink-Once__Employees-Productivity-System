<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Add Employee - Admin</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="/static/js/theme.js" defer></script>
    <style>
        .multi-select { position: relative; }
        .ms-button { display: flex; align-items: center; justify-content: space-between; padding: 0.4rem; border: 1px solid #ccc; background: #fff; cursor: pointer; }
        .ms-dropdown { position: absolute; z-index: 50; background: #fff; border: 1px solid #ccc; width: 100%; max-height: 220px; overflow: auto; margin-top: 4px; box-shadow: 0 4px 8px rgba(0,0,0,0.08); }
        .ms-option { padding: 0.35rem 0.5rem; display: flex; align-items: center; }
        .ms-option input { margin-right: 0.5rem; }
        .ms-tags { display: inline-block; max-width: 85%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    </style>
</head>
<body>
    <nav class="navbar glass-panel" style="margin-bottom: 1rem;">
        <div class="nav-brand">
            <span class="gradient-text"><i class="fa-solid fa-bolt"></i> Blink Once</span>
        </div>
        <div class="nav-links">
            <a href="/admin/add-employee" class="btn btn-outline btn-sm"><i class="fa-solid fa-user-plus"></i> Add Employee</a>
            <a href="/admin/view-employees" class="btn btn-outline btn-sm"><i class="fa-solid fa-users"></i> View Employees</a>
            <a href="/admin/dashboard" class="btn btn-outline btn-sm"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
        </div>
    </nav>
    <main class="main-container">
        <div class="glass-panel" style="padding:1.5rem; max-width:1000px; margin:1.5rem auto;">
            <h2 class="mb-3">Add New Employee</h2>
            <form id="add-employee-form" enctype="multipart/form-data">
                <div class="form-group">
                    <label class="required">Employee Type</label>
                    <select name="role" class="form-control" required>
                        <option value="Editor">Editor</option>
                        <option value="Photographer">Photographer</option>
                        <option value="Freelance">Freelance</option>
                        <option value="Intern">Intern</option>
                        <option value="Manager">Manager / Team Lead</option>
                    </select>
                </div>

                <h4 class="mt-4">Personal Details</h4>
                <div class="grid-2">
                    <div class="form-group">
                        <label class="required">Full Name</label>
                        <input type="text" name="full_name" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label class="required">Email Address</label>
                        <input type="email" name="email" class="form-control" required>
                    </div>
                </div>

                <div class="grid-2">
                    <div class="form-group">
                        <label class="required">Mobile Number</label>
                        <input type="text" name="mobile_number" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label class="required">Date of Birth</label>
                        <input type="date" name="dob" class="form-control" required>
                    </div>
                </div>

                <div class="grid-2">
                    <div class="form-group">
                        <label class="required">Gender</label>
                        <select name="gender" class="form-control" required>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                            <option value="Prefer not to say">Prefer not to say</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="required">Emergency Contact Number</label>
                        <input type="text" name="emergency_contact" class="form-control" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="required">Address</label>
                    <textarea name="address" class="form-control" rows="2" required></textarea>
                </div>

                <div class="form-group">
                    <label class="required">Passport Size Photo</label>
                    <input type="file" name="photo" accept="image/*" class="form-control" required>
                </div>

                <h4 class="mt-4">Education Details</h4>
                <div class="grid-2">
                    <div class="form-group">
                        <label>Highest Qualification</label>
                        <select name="highest_qualification" class="form-control">
                            <option value="High School">High School</option>
                            <option value="Diploma">Diploma</option>
                            <option value="Bachelor's">Bachelor's</option>
                            <option value="Master's">Master's</option>
                            <option value="PhD">PhD</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>School / College / Institution</label>
                        <input type="text" name="institution_name" class="form-control">
                    </div>
                </div>
                <div class="form-group">
                    <label>Upload Marksheet / Degree Certificate</label>
                    <input type="file" name="certificates" class="form-control">
                </div>

                <h4 class="mt-4">Employment Details</h4>
                <div class="grid-2">
                    <div class="form-group">
                        <label class="required">Date of Joining</label>
                        <input type="date" name="date_of_joining" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label class="required">Department</label>
                        
                        <div class="multi-select" id="department_multi"></div>
                        <select name="department" id="department_select" class="form-control" multiple size="5" style="display:none;" required>
                            <option value="Photography">Photography</option>
                            <option value="Videography">Videography</option>
                            <option value="Editing">Editing</option>
                            <option value="Creative / Design">Creative / Design</option>
                            <option value="Sales & Marketing">Sales & Marketing</option>
                            <option value="Client Management">Client Management</option>
                            <option value="Finance / Accounts">Finance / Accounts</option>
                            <option value="Administration">Administration</option>
                            <option value="IT / Technical Support">IT / Technical Support</option>
                            <option value="Freelance / External Resources">Freelance / External Resources</option>
                            <option value="Management">Management</option>
                        </select>
                    </div>
                </div>
                <div class="grid-2">
                    <div class="form-group">
                        <label class="required">Designation</label>
                        
                        <div class="multi-select" id="designation_multi"></div>
                        <select name="designation" id="designation_select" class="form-control" multiple size="5" style="display:none;" required>
                            <option value="Photographer">Photographer</option>
                            <option value="Videographer">Videographer</option>
                            <option value="Cinematographer">Cinematographer</option>
                            <option value="Video Editor">Video Editor</option>
                            <option value="Photo Editor">Photo Editor</option>
                            <option value="VFX Editor">VFX Editor</option>
                            <option value="Social Media Manager">Social Media Manager</option>
                            <option value="Sales Executive">Sales Executive</option>
                            <option value="Marketing Executive">Marketing Executive</option>
                            <option value="Client Relationship Manager">Client Relationship Manager</option>
                            <option value="Team Lead">Team Lead</option>
                            <option value="Project Manager">Project Manager</option>
                            <option value="Department Manager">Department Manager</option>
                            <option value="Freelance Photographer / Videographer">Freelance Photographer / Videographer</option>
                            <option value="Freelance Editor">Freelance Editor</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="required">Salary / Payment Type</label>
                        <select name="salary_type" class="form-control" required>
                            <option value="Monthly Salary">Monthly Salary</option>
                            <option value="Per Project">Per Project</option>
                            <option value="Freelance Rate">Freelance Rate</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label class="required">Salary / Rate</label>
                    <input type="text" name="salary_value" class="form-control" required>
                </div>

                <h4 class="mt-4">Skills & Experience</h4>
                <div class="grid-2">
                    <div class="form-group">
                        <label>Experience (Years/Months)</label>
                        <input type="text" name="experience" class="form-control">
                    </div>
                    <div class="form-group">
                        <label>Camera Skill Level</label>
                        <input type="text" name="camera_skill_level" class="form-control">
                    </div>
                </div>
                <div class="form-group">
                    <label>Skills / Expertise</label>
                    <textarea name="skills" class="form-control" rows="2"></textarea>
                </div>
                <div class="form-group">
                    <label>Software Knowledge</label>
                    <input type="text" name="software_knowledge" class="form-control">
                </div>

                <h4 class="mt-4">Documents Upload</h4>
                <div class="grid-2">
                    <div class="form-group">
                        <label class="required">Resume / CV</label>
                        <input type="file" name="resume" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label class="required">Aadhaar Front</label>
                        <input type="file" name="aadhaar_front" class="form-control" required>
                    </div>
                </div>
                <div class="grid-2">
                    <div class="form-group">
                        <label class="required">Aadhaar Back</label>
                        <input type="file" name="aadhaar_back" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label class="required">Certificates</label>
                        <input type="file" name="certificates" class="form-control" required>
                    </div>
                </div>

                <div class="mt-3">
                    <button type="submit" class="btn btn-primary">Create Employee</button>
                    <a href="/admin/dashboard" class="btn btn-outline" style="margin-left:0.5rem;">Cancel</a>
                </div>
            </form>
        </div>
    </main>

    <script>
        // Create a dropdown-style multi-select (checkbox list) wired to an underlying <select>
        function createMultiSelect(selectId, containerId, searchInputId, placeholder) {
            const select = document.getElementById(selectId);
            const container = document.getElementById(containerId);
            const searchInput = document.getElementById(searchInputId);
            if (!select || !container) return;

            const btn = document.createElement('div'); btn.className = 'ms-button';
            const tags = document.createElement('span'); tags.className = 'ms-tags'; tags.textContent = placeholder;
            const caret = document.createElement('span'); caret.textContent = '▾';
            btn.appendChild(tags); btn.appendChild(caret);

            const dropdown = document.createElement('div'); dropdown.className = 'ms-dropdown'; dropdown.style.display = 'none';

            Array.from(select.options).forEach((opt, idx) => {
                const row = document.createElement('label'); row.className = 'ms-option';
                const cb = document.createElement('input'); cb.type = 'checkbox'; cb.value = opt.value; cb.checked = opt.selected;
                cb.dataset.idx = idx;
                const txt = document.createElement('span'); txt.textContent = opt.text;
                row.appendChild(cb); row.appendChild(txt);
                dropdown.appendChild(row);

                cb.addEventListener('change', () => {
                    select.options[cb.dataset.idx].selected = cb.checked;
                    updateTags();
                });
            });

            function updateTags() {
                const selected = Array.from(select.selectedOptions).map(o => o.text);
                tags.textContent = selected.length ? selected.join(', ') : placeholder;
            }

            if (searchInput) {
                searchInput.addEventListener('input', () => {
                    const q = searchInput.value.trim().toLowerCase();
                    Array.from(dropdown.children).forEach(row => {
                        const text = row.textContent.trim().toLowerCase();
                        row.style.display = q === '' || text.includes(q) ? '' : 'none';
                    });
                });
            }

            btn.addEventListener('click', (ev) => { ev.stopPropagation(); dropdown.style.display = dropdown.style.display === 'none' ? 'block' : 'none'; });
            document.addEventListener('click', (e) => { if (!container.contains(e.target)) dropdown.style.display = 'none'; });

            container.appendChild(btn);
            container.appendChild(dropdown);
            updateTags();
        }

        createMultiSelect('department_select', 'department_multi', 'dept_search', 'Select departments');
        createMultiSelect('designation_select', 'designation_multi', 'desig_search', 'Select designations');

        document.getElementById('add-employee-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const form = document.getElementById('add-employee-form');
            const photoInput = form.querySelector('input[name="photo"]');
            if (!photoInput || photoInput.files.length === 0) {
                alert('Passport Size Photo is required.');
                photoInput.focus();
                return;
            }
            const fd = new FormData(form);
            const res = await fetch('/api/admin/add-employee', { method: 'POST', body: fd });
            const data = await res.json();
            alert(data.message + (data.employee_code ? ' - ' + data.employee_code : ''));
            if (res.ok) form.reset();
        });
    </script>
</body>
</html>
